<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاهز للمفاجأة؟</title>
    <style>
        /* إعدادات الخطوط والخلفية */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: url('1000280498.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* طبقة تعتيم خفيفة جداً وثابتة للخلفية */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        /* حاوية المحتوى الشفافة */
        .card {
            text-align: center;
            z-index: 1;
            padding: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* المرحلة الأولى: خط كبير ومكشوف بالكامل */
        .step-title-large {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 35px;
            line-height: 1.3;
            background: linear-gradient(180deg, #ffffff 10%, #ffdf78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textPulse 3s ease-in-out infinite alternate;
            letter-spacing: -0.5px;
        }

        /* المربع الضبابي الهندسي المتناسق والواضح جداً */
        .blur-box {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-width: 380px;
            width: 90%;
            margin: 0 auto;
        }

        /* نصوص الأسئلة والمرحلة الثانية */
        .step-title-box {
            font-size: 1.7rem;
            font-weight: 900;
            margin-bottom: 25px;
            line-height: 1.4;
            background: linear-gradient(180deg, #ffffff 30%, #ffdf78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
            letter-spacing: -0.5px;
        }

        /* رقم المرحلة الحالي */
        .level-indicator {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffdf78;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* عداد الأخطاء */
        .error-counter {
            font-size: 0.85rem;
            color: #ff6b6b;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* أزرار التحكم الفاخرة */
        .btn-premium {
            position: relative;
            display: inline-block;
            padding: 8px 30px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #050505;
            background: linear-gradient(135deg, #ffeaa7 0%, #d4af37 100%);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* خيارات الأسئلة الثلاثة */
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 15px;
        }

        .btn-option {
            width: 100%;
            padding: 12px 15px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            line-height: 1.3;
        }

        .btn-option:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffdf78;
            transform: translateY(-2px);
        }

        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.6s;
        }

        .btn-premium:hover::before { left: 100%; }
        .btn-premium:hover { transform: translateY(-2px); opacity: 0.95; }

        .hidden-section {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes textPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <h1 class="step-title-large">جاهز لرؤية مفاجأة؟</h1>
            <button class="btn-premium" onclick="goToNextStep()">جاهز</button>
        </div>

        <div id="step2" class="hidden-section blur-box">
            <h1 class="step-title-box">مو بهل سهولة لازم تخوض تحديات لكي تحصل عليها</h1>
            <button class="btn-premium" onclick="startQuiz()">متابعة</button>
        </div>

        <div id="quiz-container" class="hidden-section blur-box">
            <div class="level-indicator" id="quiz-level">المرحلة 1 من 11</div>
            <div class="error-counter" id="error-count">الأخطاء المتبقية قبل الإعادة: 2</div>
            <h2 class="step-title-box" id="quiz-question">نص السؤال هنا؟</h2>
            <div class="quiz-options" id="quiz-options-container"></div>
        </div>

        <div id="success-step" class="hidden-section blur-box">
            <div class="level-indicator">مبروووك! 🎉</div>
            <h1 class="step-title-box">أثبتت أنك تستحق المفاجأة!</h1>
            <p style="font-size: 1.05rem; color: #ffdf78; margin-bottom: 25px; font-weight: 600;">لقد أكملت جميع التحديات بنجاح.</p>
            <button class="btn-premium" onclick="revealFinalSurprise()">رؤية المفاجأة الكبرى</button>
        </div>
    </div>

    <script>
        // 11 مرحلة متكاملة لبرنامج قسمة ونصيب بأسئلة شيقة وصعبة
        const quizData = [
            {
                question: "من هي الإعلامية والنجمة التي تقوم بتقديم برنامج قسمة ونصيب؟",
                options: ["ريتا حرب", "لجين عمران", "أنابيلا هلال"],
                correct: 0
            },
            {
                question: "في أي بلد أو جزيرة ساحرة يتم تصوير حلقات البرنامج؟",
                options: ["اليونان", "قبرص", "تركيا"],
                correct: 2
            },
            {
                question: "ما هي القاعدة الصارمة للبرنامج بخصوص تواصل المشتركين مع العالم الخارجي؟",
                options: ["يسمح بساعة يومياً للهاتف", "ممنوع استخدام الهواتف أو الإنترنت تماماً", "يسمح بالتواصل بالرسائل فقط"],
                correct: 1
            },
            {
                question: "ما هو الإجراء الذي يحدث عندما يفشل المشترك في بناء أي علاقة أو تحالف داخل الفيلا؟",
                options: ["يتم استبداله بمشترك جديد (إقصاء)", "يتم نقله لغرفة منفردة", "يعطى فرصة للتصويت المباشر فقط"],
                correct: 0
            },
            {
                question: "كم عدد المشتركين الإجمالي (شباب وبنات) الذين يبدأ بهم الموسم عادة في الفيلا؟",
                options: ["10 مشتركين", "14 مشتركاً", "18 مشتركاً"],
                correct: 1
            },
            {
                question: "ما الذي يحدد الطرف الذي يمتلك سلطة الاختيار والإقصاء في الحلقات الأسبوعية؟",
                options: ["قرعة عشوائية تجريها المذيعة", "حسب التصويت الأعلى للجمهور", "تبادل الأدوار أسبوعياً بين الشباب والبنات"],
                correct: 2
            },
            // الـ 5 مراحل الإضافية والجديدة:
            {
                question: "ما هو الاسم الفني أو اللقب الذي يطلق على الغرفة الخاصة التي يجلس فيها المشترك ليتحدث بصراحة للكاميرا؟",
                options: ["غرفة الاعتراف الصادق", "غرفة كسر القيود", "غرفة الصراحة (الـ Confession)"],
                correct: 2
            },
            {
                question: "كيف يتم دخول مشتركين جدد إلى الفيلا بعد مرور أسابيع على انطلاق البرنامج؟",
                options: ["كـ 'ضيوف شرف' بدون حق تصويت", "كـ 'مفاجأة غير متوقعة' لتهديد العلاقات المستقرة", "عبر سحب بالقرعة من الجمهور فقط"],
                correct: 1
            },
            {
                question: "ما هو اليوم أو الحدث الأسبوعي الأكثر توتراً وضغطاً على المشتركين داخل الفيلا؟",
                options: ["يوم حفل العشاء الفاخر", "يوم البث المباشر مع الجمهور", "يوم الإقصاء والاختيار (البرايم الأسبوعي)"],
                correct: 2
            },
            {
                question: "ما الذي يتوجب على الثنائي (الشباب والبنات) فعله لضمان البقاء وعدم التعرض للإقصاء؟",
                options: ["الفوز بمسابقات اللياقة البدنية", "بناء توافق حقيقي وإقناع بقية المشتركين بقوة علاقتهم", "تجميع أكبر عدد من الهدايا المادية"],
                correct: 1
            },
            {
                question: "ما هي الميزة الأساسية التي يحصل عليها الثنائي الفائز في الحلقة الأخيرة من الموسم؟",
                options: ["فرصة إنتاج برنامج واقعي خاص بهم", "تغطية تكاليف الزفاف، تذاكر شهر العسل، ومبلغ مالي لتأسيس حياتهم", "الحصول على حصة من أرباح القناة المنتجة"],
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let wrongAnswersCount = 0;

        function goToNextStep() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function startQuiz() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            currentQuestionIndex = 0;
            wrongAnswersCount = 0;
            updateErrorDisplay();
            loadQuestion();
        }

        function updateErrorDisplay() {
            const remaining = 2 - wrongAnswersCount;
            document.getElementById('error-count').innerText = `الأخطاء المتبقية قبل إعادة اللعبة للصفر: ${remaining}`;
        }

        function loadQuestion() {
            const currentData = quizData[currentQuestionIndex];
            
            document.getElementById('quiz-level').innerText = `المرحلة ${currentQuestionIndex + 1} من ${quizData.length}`;
            document.getElementById('quiz-question').innerText = currentData.question;
            
            const optionsContainer = document.getElementById('quiz-options-container');
            optionsContainer.innerHTML = "";
            
            currentData.options.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.className = 'btn-option';
                button.innerText = optionText;
                button.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex) {
            const currentData = quizData[currentQuestionIndex];
            
            if (selectedIndex === currentData.correct) {
                currentQuestionIndex++;
                
                if (currentQuestionIndex < quizData.length) {
                    const container = document.getElementById('quiz-container');
                    container.style.animation = 'none';
                    container.offsetHeight; 
                    container.style.animation = 'fadeIn 0.5s ease-out forwards';
                    loadQuestion();
                } else {
                    document.getElementById('quiz-container').style.display = 'none';
                    document.getElementById('success-step').style.display = 'block';
                }
            } else {
                wrongAnswersCount++;
                
                if (wrongAnswersCount >= 2) {
                    alert("💥 أخطأت مرتين! اللعبة قاسية.. تم إعادتك للمرحلة الأولى للبدء من جديد!");
                    currentQuestionIndex = 0;
                    wrongAnswersCount = 0;
                    updateErrorDisplay();
                    loadQuestion();
                } else {
                    updateErrorDisplay();
                    alert("❌ إجابة خاطئة! احذر، الخطأ القادم سيعيدك للسؤال الأول تماماً.");
                }
            }
        }

        function revealFinalSurprise() {
            alert("🎁 كفووو! أثبتت جدارتك واستحقاقك بالكامل للمفاجأة: [اكتب هنا الشيء أو الرابط الذي تريد تقديمه للمستخدم] 🎉");
        }
    </script>

</body>
</html>
