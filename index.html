<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاهز للمفاجأة؟</title>
    <style>
        /* إعدادات الخطوط والخلفية */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: url('1000280498.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* طبقة تعتيم خفيفة جداً للحفاظ على ألوان الصورة الأصلية */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 0;
        }

        /* حاوية المحتوى الرئيسي (تم جعلها شفافة تماماً كالزجاج النقي لتظهر الخلفية) */
        .card {
            text-align: center;
            z-index: 1;
            padding: 55px 45px;
            border-radius: 28px;
            
            /* خلفية شفافة جداً ناعمة مع تأثير تغبيش قوي للإضاءة الخلفية */
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            /* حدود زجاجية ناعمة لتعطي حافة احترافية */
            border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);
            
            max-width: 500px;
            width: 90%;
            animation: fadeInCard 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
