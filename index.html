<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاهز للمفاجأة؟</title>
    <style>
        /* إعدادات الخطوط والخلفية */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: url('1000280498.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* طبقة تعتيم خفيفة جداً وثابتة للخلفية بدون تأثير ضبابي */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 0;
        }

        /* حاوية المحتوى (بدون أي تضليل أو خلفية زجاجية - شفافة تماماً) */
        .card {
            text-align: center;
            z-index: 1;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            animation: fadeInCard 1s ease-out;
        }

        /* نص أصغر وناعم بتأثير نبض خفيف جداً */
        .surprise-text {
            font-size: 2rem; /* تم تصغير الحجم */
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.4;
            background: linear-gradient(180deg, #ffffff 0%, #ffdf78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textPulse 3s ease-in-out infinite alternate;
            letter-spacing: -0.5px;
        }

        /* زر أصغر وناعم يحمل نص "جاهز" */
        .btn-premium {
            position: relative;
            display: inline-block;
            padding: 10px 45px; /* تم تصغير الحجم والارتفاع */
            font-size: 1.05rem; /* تم تصغير الخط */
            font-weight: 600;
            color: #050505;
            background: linear-gradient(135deg, #ffeaa7 0%, #d4af37 100%);
            border: none;
            border-radius: 8px; /* زوايا أنعم متناسقة مع الحجم الصغير */
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* تأثير لمعان خفيف عند تمرير الماوس */
        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.6s;
        }

        .btn-premium:hover::before {
            left: 100%;
        }

        .btn-premium:hover {
            transform: translateY(-3px);
            opacity: 0.95;
        }

        .btn-premium:active {
            transform: translateY(-1px);
        }

        /* أنيميشن نبض ناعم جداً للنص */
        @keyframes textPulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.02);
            }
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="surprise-text">جاهز لرؤية مفاجأة؟</h1>
        
        <button class="btn-premium" onclick="revealSurprise()">جاهز</button>
    </div>

    <script>
        function revealSurprise() {
            alert('🎉 استعد.. المفاجأة الكبرى قادمة فوراً!');
        }
    </script>

</body>
</html>
