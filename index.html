<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاهز للمفاجأة؟</title>
    <style>
        /* إعدادات الخطوط والخلفية */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: url('1000280498.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* طبقة تعتيم خفيفة جداً وثابتة للخلفية */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        /* حاوية المحتوى الشفافة الفليكس لضمان التوسط الدقيق */
        .card {
            text-align: center;
            z-index: 1;
            padding: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* المرحلة الأولى: مكشوفة فوق الخلفية مباشرة بجودة خط خارقة */
        .step-title-large {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 35px;
            line-height: 1.3;
            background: linear-gradient(180deg, #ffffff 10%, #ffdf78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textPulse 3s ease-in-out infinite alternate;
            letter-spacing: -0.5px;
        }

        /* المربع الضبابي الهندسي المخصص للمرحلة الثانية - محدد وعرضه ثابت ليظهر كمربع حقيقي على الجوال */
        .blur-box {
            background: rgba(15, 15, 15, 0.65); /* تعتيم فخم وواضح جداً لإبراز الكلمات */
            backdrop-filter: blur(16px); /* زيادة الضباب لعزل تفاصيل الخلفية تحت النص */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px; /* زوايا مربعة ناعمة واحترافية */
            padding: 35px 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            max-width: 360px; /* تحديد العرض بدقة ليجبره على اتخاذ مظهر المربع المتناسق على الهاتف */
            width: 90%;
            margin: 0 auto;
        }

        /* نص المرحلة الثانية المتناسق والواضح جداً */
        .step-title-box {
            font-size: 2rem; /* حجم خط مثالي ومتناسق مع أبعاد المربع */
            font-weight: 900;
            margin-bottom: 30px;
            line-height: 1.4;
            background: linear-gradient(180deg, #ffffff 30%, #ffdf78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5)); /* ظل إضافي خلف الحروف لزيادة الوضوح */
            letter-spacing: -0.5px;
        }

        /* بوكس الأزرار الصغير والأنيق جداً */
        .btn-premium {
            position: relative;
            display: inline-block;
            padding: 8px 30px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #050505;
            background: linear-gradient(135deg, #ffeaa7 0%, #d4af37 100%);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* تأثير لمعان خفيف جداً عند التمرير */
        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.6s;
        }

        .btn-premium:hover::before {
            left: 100%;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        /* إخفاء قسم التحدي بالبداية وعمل أنيميشن عند الظهور */
        .hidden-section {
            display: none;
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* أنيميشن نبض ناعم جداً للنصوص */
        @keyframes textPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        /* أنيميشن ظهور انسيابي للمرحلة الثانية */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <h1 class="step-title-large">جاهز لرؤية مفاجأة؟</h1>
            <button class="btn-premium" onclick="goToNextStep()">جاهز</button>
        </div>

        <div id="step2" class="hidden-section blur-box">
            <h1 class="step-title-box">مو بهل سهولة لازم تخوض تحديات لكي تحصل عليها</h1>
            <button class="btn-premium" onclick="startChallenges()">متابعة</button>
        </div>
    </div>

    <script>
        function goToNextStep() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function startChallenges() {
            alert('⚔️ استعد لبدء التحدي الأول الآن!');
        }
    </script>

</body>
</html>
