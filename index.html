<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاهز للمفاجأة؟</title>
    <style>
        /* إعدادات الخطوط والخلفية */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: url('1000280498.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* طبقة تعتيم خفيفة جداً وثابتة للخلفية */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 0;
        }

        /* حاوية المحتوى الشفافة */
        .card {
            text-align: center;
            z-index: 1;
            padding: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* المرحلة الأولى: مكشوفة فوق الخلفية مباشرة بجودة خط خارقة */
        .step-title-large {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 35px;
            line-height: 1.3;
            background: linear-gradient(180deg, #ffffff 10%, #ffdf78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textPulse 3s ease-in-out infinite alternate;
            letter-spacing: -0.5px;
        }

        /* المربع الضبابي الهندسي المتناسق والواضح جداً */
        .blur-box {
            background: rgba(15, 15, 15, 0.7); /* تعتيم مثالي لقراءة الأسئلة بوضوح */
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-width: 380px; /* الحفاظ على شكل المربع المتناسق */
            width: 90%;
            margin: 0 auto;
        }

        /* نصوص الأسئلة والمرحلة الثانية */
        .step-title-box {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 25px;
            line-height: 1.4;
            background: linear-gradient(180deg, #ffffff 30%, #ffdf78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
            letter-spacing: -0.5px;
        }

        /* رقم المرحلة الحالي (أعلى السؤال) */
        .level-indicator {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffdf78;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* أزرار التحكم الفاخرة (جاهز / متابعة) */
        .btn-premium {
            position: relative;
            display: inline-block;
            padding: 8px 30px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #050505;
            background: linear-gradient(135deg, #ffeaa7 0%, #d4af37 100%);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* خيارات الأسئلة الثلاثة (تصميم عمودي أنيق وواضح) */
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 15px;
        }

        .btn-option {
            width: 100%;
            padding: 12px 15px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }

        .btn-option:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffdf78;
            transform: translateY(-2px);
        }

        /* تأثير لمعان الأزرار الرئيسية */
        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.6s;
        }

        .btn-premium:hover::before { left: 100%; }
        .btn-premium:hover { transform: translateY(-2px); opacity: 0.95; }

        /* إخفاء المراحل بالبداية للتحكم بها عبر الجافاسكريبت */
        .hidden-section {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes textPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <h1 class="step-title-large">جاهز لرؤية مفاجأة؟</h1>
            <button class="btn-premium" onclick="goToNextStep()">جاهز</button>
        </div>

        <div id="step2" class="hidden-section blur-box">
            <h1 class="step-title-box">مو بهل سهولة لازم تخوض تحديات لكي تحصل عليها</h1>
            <button class="btn-premium" onclick="startQuiz()">متابعة</button>
        </div>

        <div id="quiz-container" class="hidden-section blur-box">
            <div class="level-indicator" id="quiz-level">المرحلة 1 من 4</div>
            <h2 class="step-title-box" id="quiz-question">نص السؤال هنا؟</h2>
            <div class="quiz-options" id="quiz-options-container">
                </div>
        </div>

        <div id="success-step" class="hidden-section blur-box">
            <div class="level-indicator">تهانينا! 🎉</div>
            <h1 class="step-title-box">أثبتت أنك كفو وتستحق المفاجأة!</h1>
            <p style="font-size: 1.1rem; color: #ffdf78; margin-bottom: 25px; font-weight: 600;">كل الإجابات صحيحة 100%</p>
            <button class="btn-premium" onclick="revealFinalSurprise()">رؤية المفاجأة الكبرى</button>
        </div>
    </div>

    <script>
        // بيانات الأسئلة والاختيارات لبرنامج قسمة ونصيب
        const quizData = [
            {
                question: "من هي الإعلامية والنجمة التي تقوم بتقديم برنامج قسمة ونصيب؟",
                options: ["ريتا حرب", "لجين عمران", "أنابيلا هلال"],
                correct: 0 // الخيار الأول هو الصحيح (ريتا حرب)
            },
            {
                question: "في أي بلد أو جزيرة ساحرة يتم تصوير حلقات برنامج قسمة ونصيب؟",
                options: ["اليونان", "تركيا", "قبرص"],
                correct: 1 // الخيار الثاني هو الصحيح (تركيا)
            },
            {
                question: "ما هي الفكرة الأساسية والتصنيف الرئيسي لبرنامج قسمة ونصيب؟",
                options: ["برنامج طبخ ومنافسات", "برنامج واقعي للتعارف والزواج", "مسابقة أسئلة ومعلومات عامة"],
                correct: 1 // الخيار الثاني هو الصحيح
            },
            {
                question: "ما هو الهدف النهائي المشوق للمشتركين الرابحين في نهاية البرنامج؟",
                options: ["الحصول على لقب أفضل طاهٍ", "الفوز بجائزة مالية وحفل زفاف وتأسيس حياة مشتركة", "السفر حول العالم في رحلة مجانية"],
                correct: 1 // الخيار الثاني هو الصحيح
            }
        ];

        let currentQuestionIndex = 0;

        function goToNextStep() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function startQuiz() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            loadQuestion();
        }

        // دالة بناء وتحديث السؤال والخيارات الثلاثة برمجياً داخل المربع
        function loadQuestion() {
            const currentData = quizData[currentQuestionIndex];
            
            // تحديث رقم المرحلة ونص السؤال
            document.getElementById('quiz-level').innerText = `المرحلة ${currentQuestionIndex + 1} من ${quizData.length}`;
            document.getElementById('quiz-question').innerText = currentData.question;
            
            // تفريغ الحاوية وبناء الأزرار الثلاثة للخيارات
            const optionsContainer = document.getElementById('quiz-options-container');
            optionsContainer.innerHTML = "";
            
            currentData.options.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.className = 'btn-option';
                button.innerText = optionText;
                // عند الضغط، نتحقق هل الاختيار صحيح أم لا
                button.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex) {
            const currentData = quizData[currentQuestionIndex];
            
            if (selectedIndex === currentData.correct) {
                // إذا كانت الإجابة صحيحة يعبر فوراً للمرحلة التالية
                currentQuestionIndex++;
                
                if (currentQuestionIndex < quizData.length) {
                    // الانتقال للسؤال التالي بنعومة
                    const container = document.getElementById('quiz-container');
                    container.style.animation = 'none';
                    container.offsetHeight; /* تفعيل التحديث */
                    container.style.animation = 'fadeIn 0.5s ease-out forwards';
                    loadQuestion();
                } else {
                    // إذا أنهى كل الأسئلة بنجاح تظهر صفحة الفوز
                    document.getElementById('quiz-container').style.display = 'none';
                    document.getElementById('success-step').style.display = 'block';
                }
            } else {
                // إذا أخطأ يظهر له تنبيه ذكي لإعادة المحاولة
                alert("❌ إجابة خاطئة! ركز جيداً وحاول مرة أخرى لتثبت جدارتك.");
            }
        }

        // الأكشن النهائي عند تخطي التحدي بالكامل والضغط على زر المفاجأة
        function revealFinalSurprise() {
            alert("🎁 كفووو! إليك المفاجأة المنتظرة: [اكتب هنا الشيء أو الرابط الذي تريد تقديمه للمستخدم كمفاجأة] 🎉");
        }
    </script>

</body>
</html>
