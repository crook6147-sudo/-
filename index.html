<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاهز للمفاجأة؟</title>
    <style>
        /* إعدادات الخطوط والخلفية */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            /* تعيين صورتك كخلفية للموقع - ستعمل مباشرة بعد الرفع على Vercel */
            background: url('1000280498.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* طبقة تعتيم سينمائية فخمة تبرز النص وتدمج ألوان الكرت مع أجواء الفيلا الليلية */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(5, 5, 5, 0.45) 0%, rgba(5, 5, 5, 0.8) 100%);
            z-index: 0;
        }

        /* حاوية المحتوى الرئيسي (بطاقة نيون زجاجية فاخرة جداً) */
        .card {
            text-align: center;
            z-index: 1;
            padding: 55px 45px;
            border-radius: 24px;
            background: rgba(10, 10, 10, 0.6); /* شفافية متناسقة مع ظلال الليل */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2); /* إطار ذهبي خفيف جداً يطابق إضاءة اللمبات */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
            animation: fadeInCard 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* النص المتحرك الاحترافي بتأثير نبض وتدرج ذهبي ملكي */
        .surprise-text {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 45px;
            line-height: 1.4;
            background: linear-gradient(180deg, #ffffff 0%, #ffdf78 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.9));
            animation: textPulse 2.5s ease-in-out infinite alternate;
            letter-spacing: -0.5px;
        }

        /* زر المتابعة الفاخر بنظام الوهج التفاعلي */
        .btn-premium {
            position: relative;
            display: inline-block;
            padding: 16px 65px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #050505;
            background: linear-gradient(135deg, #ffeaa7 0%, #d4af37 50%, #aa8212 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 5px 25px rgba(212, 175, 55, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* تأثير خط البرق اللامع عند تمرير الماوس */
        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.6s;
        }

        .btn-premium:hover::before {
            left: 100%;
        }

        .btn-premium:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.65);
        }

        .btn-premium:active {
            transform: translateY(-1px);
        }

        /* حركات الأنيميشن */
        @keyframes textPulse {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
            }
            100% {
                transform: scale(1.03);
                filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.75));
            }
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="surprise-text">جاهز لرؤية مفاجأة؟</h1>
        
        <button class="btn-premium" onclick="revealSurprise()">متابعة</button>
    </div>

    <script>
        // دالة الأكشن عند الضغط على زر متابعة
        function revealSurprise() {
            alert('🎉 استعد.. المفاجأة الكبرى قادمة فوراً!');
            // هنا يمكنك تغيير الـ alert وتوجيه المستخدم لصفحة أخرى إذا أردت:
            // window.location.href = "رابط_صفحة_المفاجأة";
        }
    </script>

</body>
</html>
